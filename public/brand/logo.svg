<?xml version="1.0" encoding="UTF-8"?>
<!--
  Buck Mountain Cannabis — logo placeholder

  Approximation of the legacy mark from the live site (deer-skull antlers
  inside a purple triangle, "BUCK MTN" wordmark below). This is a TEMP
  placeholder — the real master vector should be exported from the design
  source on the home machine and dropped in here.

  Colors are accurate to the captured screenshot:
    - purple frame:  #5B3A8A
    - gold accent:   #C9A24A (matches our --accent token)
    - off-white bg:  transparent

  Sized as a viewBox so the nav can scale it without re-exporting.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 160 120"
  role="img"
  aria-label="Buck Mountain Cannabis"
>
  <defs>
    <linearGradient id="gold" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#E5C97A" />
      <stop offset="100%" stop-color="#8A6F2A" />
    </linearGradient>
  </defs>

  <!-- purple inverted triangle frame -->
  <polygon
    points="20,15 140,15 80,100"
    fill="none"
    stroke="#5B3A8A"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- antlers (stylized fork shapes flaring out and up) -->
  <g fill="url(#gold)" stroke="#5A4318" stroke-width="0.75">
    <path d="M 60 38 Q 55 25 48 22 Q 50 30 52 36 Q 47 30 40 30 Q 45 36 50 40 Q 54 40 60 42 Z" />
    <path d="M 100 38 Q 105 25 112 22 Q 110 30 108 36 Q 113 30 120 30 Q 115 36 110 40 Q 106 40 100 42 Z" />
  </g>

  <!-- skull head (simplified rounded triangle) -->
  <g fill="url(#gold)" stroke="#5A4318" stroke-width="0.75">
    <path
      d="M 65 40
         C 60 50 60 58 68 64
         L 80 70
         L 92 64
         C 100 58 100 50 95 40
         Q 80 33 65 40 Z"
    />
    <!-- eye sockets -->
    <ellipse cx="72" cy="52" rx="2.5" ry="3.5" fill="#1a0f1f" stroke="none" />
    <ellipse cx="88" cy="52" rx="2.5" ry="3.5" fill="#1a0f1f" stroke="none" />
    <!-- nose -->
    <path d="M 80 58 L 78 64 L 82 64 Z" fill="#1a0f1f" stroke="none" />
  </g>

  <!-- BUCK MTN wordmark -->
  <text
    x="80"
    y="92"
    text-anchor="middle"
    font-family="ui-serif, Georgia, 'Times New Roman', serif"
    font-size="11"
    font-weight="700"
    letter-spacing="2"
    fill="url(#gold)"
  >BUCK MTN</text>
</svg>

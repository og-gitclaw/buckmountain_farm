<?xml version="1.0" encoding="UTF-8"?>
<!--
  Buck Mountain Cannabis — primary mark.

  Refined 2026-05-26 — same composition as before (gold antlered deer
  skull inside a purple triangle, "BUCK MTN" wordmark below) but cleaner,
  flatter, less gradient-noisy so it reads as a logo at any size and on
  any background. The transparent canvas means it sits cleanly on either
  the dark site bg or a light email background.

  Real master vector still pending from the design source — when that
  lands, replace this file (keep the same filename + viewBox so callers
  don't break).
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 160 120"
  role="img"
  aria-label="Buck Mountain Cannabis"
  fill="none"
>
  <!-- inverted purple triangle frame -->
  <polygon
    points="20,16 140,16 80,102"
    stroke="#5B3A8A"
    stroke-width="3"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- antlers — left -->
  <path
    d="M 60 40
       C 56 30 52 24 46 22
       M 56 30 C 52 30 46 28 44 26
       M 60 40 C 58 36 56 32 56 28
       M 60 40 C 56 38 50 38 46 36"
    stroke="#C9A24A"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- antlers — right (mirror) -->
  <path
    d="M 100 40
       C 104 30 108 24 114 22
       M 104 30 C 108 30 114 28 116 26
       M 100 40 C 102 36 104 32 104 28
       M 100 40 C 104 38 110 38 114 36"
    stroke="#C9A24A"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- skull -->
  <path
    d="M 65 42
       C 60 50 60 60 68 66
       L 80 72
       L 92 66
       C 100 60 100 50 95 42
       Q 80 36 65 42 Z"
    fill="#C9A24A"
    stroke="#5A4318"
    stroke-width="1"
    stroke-linejoin="round"
  />
  <!-- eye sockets -->
  <ellipse cx="72" cy="54" rx="2.6" ry="3.6" fill="#1a0f1f" />
  <ellipse cx="88" cy="54" rx="2.6" ry="3.6" fill="#1a0f1f" />
  <!-- nose -->
  <path d="M 80 60 L 78 66 L 82 66 Z" fill="#1a0f1f" />

  <!-- BUCK MTN wordmark -->
  <text
    x="80"
    y="93"
    text-anchor="middle"
    font-family="ui-serif, Georgia, 'Times New Roman', serif"
    font-size="10.5"
    font-weight="700"
    letter-spacing="2.6"
    fill="#C9A24A"
  >BUCK MTN</text>
</svg>
